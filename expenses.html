<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses | LifeOS</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dashboard-body">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">Life<span>OS</span></div>
        <nav class="sidebar-nav">
            <a href="/dashboard.html" class="nav-item">Dashboard</a>
            <a href="/expenses.html" class="nav-item active">Expenses</a>
            <a href="/vault.html" class="nav-item">Vault</a>
            <a href="/reminders.html" class="nav-item">Reminders</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <h1>Expense Tracker</h1>
            <button class="btn-primary" id="add-expense-btn">+ Add Expense</button>
        </header>

        <!-- Financial Summary -->
        <section class="expense-summary-grid">
            <div class="card summary-card">
                <h3>Total Spent (This Month)</h3>
                <h2 id="monthly-total">₹0.00</h2>
            </div>
            <div class="card summary-card">
                <h3>Remaining Budget</h3>
                <h2 id="budget-left">₹0.00</h2>
                <button class="btn-link" id="set-budget-btn">Set Limit</button>
            </div>
        </section>

        <!-- Filters -->
        <div class="expense-filters">
            <select id="category-filter">
                <option value="all">All Categories</option>
                <option value="food">Food & Drinks</option>
                <option value="transport">Transport</option>
                <option value="bills">Bills & Utilities</option>
                <option value="shopping">Shopping</option>
                <option value="entertainment">Entertainment</option>
            </select>
            <input type="month" id="month-picker">
        </div>

        <!-- Expense List -->
        <div class="expense-list-container">
            <table class="expense-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="expense-items">
                    <!-- Rows will be added by expenses.js -->
                    <tr><td colspan="5" style="text-align:center;">Loading expenses...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Add Expense Modal -->
    <div id="expense-modal" class="modal">
        <div class="modal-content">
            <h3>Add New Transaction</h3>
            <form id="expense-form">
                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="exp-amount" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="exp-desc" placeholder="e.g. Grocery shopping" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="exp-category">
                        <option value="food">Food</option>
                        <option value="transport">Transport</option>
                        <option value="bills">Bills</option>
                        <option value="shopping">Shopping</option>
                        <option value="entertainment">Entertainment</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="exp-date" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-outline" id="close-expense-modal">Cancel</button>
                    <button type="submit" class="btn-primary">Add Expense</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/supabase-config.js"></script>
    <script src="/js/expenses.js"></script>
</body>
</html>
